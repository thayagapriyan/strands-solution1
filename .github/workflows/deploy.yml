name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]
      dry_run:
        description: Run terraform plan only (no apply)
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false        # never cancel an in-flight deploy

env:
  NODE_VERSION: '18'
  TF_VERSION: '1.10.0'
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build all three services in parallel
  # ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [inventory-api, mcp-server, agent]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Compile TypeScript
        working-directory: services/${{ matrix.service }}
        run: npx tsc

      - name: Upload compiled output
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.service }}
          path: services/${{ matrix.service }}/dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 2: Package Lambda ZIPs once all builds done
  # ──────────────────────────────────────────────
  package:
    name: Package Lambda ZIPs
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: false
          path: builds/

      # Build artifacts only contain dist/ — install prod deps fresh for services
      # whose node_modules need to ship inside the Lambda ZIP.
      - name: Install prod deps for agent
        working-directory: services/agent
        run: npm ci --omit=dev

      - name: Install prod deps for mcp-server
        working-directory: services/mcp-server
        run: npm ci --omit=dev

      # api.zip — inventory-api uses only @aws-sdk/* which is preinstalled in nodejs18.x
      - name: Package inventory-api
        run: |
          mkdir -p /tmp/api-pkg dist
          cp -r builds/build-inventory-api/* /tmp/api-pkg/
          cd /tmp/api-pkg && zip -r $GITHUB_WORKSPACE/dist/api.zip .

      # agent.zip — must embed the compiled MCP server so it can spawn it as a subprocess
      - name: Package strands-agent (with embedded MCP server)
        run: |
          mkdir -p /tmp/agent-pkg dist
          cp -r builds/build-agent/* /tmp/agent-pkg/
          # MCP server is spawned as a child process by the agent at runtime
          mkdir -p /tmp/agent-pkg/mcp-server
          cp -r builds/build-mcp-server/* /tmp/agent-pkg/mcp-server/
          # The agent's package.json declares "type": "module", which Node inherits for nested
          # files unless overridden. The compiled mcp-server is CJS, so mark it explicitly.
          echo '{"type":"commonjs"}' > /tmp/agent-pkg/mcp-server/package.json
          # mcp-server has its own runtime deps (@modelcontextprotocol/sdk, axios, zod)
          cp -r services/mcp-server/node_modules /tmp/agent-pkg/mcp-server/
          # Include prod node_modules from the agent service
          cp -r services/agent/node_modules /tmp/agent-pkg/
          # package.json required so Lambda runtime treats the agent code as an ESM package
          cp services/agent/package.json /tmp/agent-pkg/
          cd /tmp/agent-pkg && zip -r $GITHUB_WORKSPACE/dist/agent.zip .

      - name: Upload Lambda ZIPs
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 3: Terraform plan + apply
  # ──────────────────────────────────────────────
  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: package
    environment: ${{ inputs.environment || 'production' }}

    permissions:
      id-token: write    # for OIDC-based AWS auth (recommended over long-lived keys)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download Lambda ZIPs
        uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: dist/

      # Use OIDC if AWS_ROLE_ARN is set, otherwise fall back to key-based auth
      - name: Configure AWS credentials (OIDC)
        if: vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (access key fallback)
        if: vars.AWS_ROLE_ARN == ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=warewise/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform Plan
        id: plan
        working-directory: infra
        run: |
          terraform plan \
            -var="anthropic_api_key=${{ secrets.ANTHROPIC_API_KEY }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -out=tfplan \
            -detailed-exitcode
        continue-on-error: true  # exit code 2 = changes pending (not an error)

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      - name: Terraform Apply
        if: inputs.dry_run != true && steps.plan.outputs.exitcode == '2'
        working-directory: infra
        run: terraform apply -auto-approve tfplan

      - name: No changes — skipping apply
        if: steps.plan.outputs.exitcode == '0'
        run: echo "Infrastructure is already up to date."

  # ──────────────────────────────────────────────
  # Job 4: Smoke test after deploy
  # ──────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: inputs.dry_run != true

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Invoke agent Lambda
        run: |
          RESPONSE=$(aws lambda invoke \
            --function-name strands-agent \
            --payload '{"query":"Is product SKU-001 in stock?"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/smoke-response.json \
            --query 'StatusCode' \
            --output text)

          echo "HTTP status: $RESPONSE"
          cat /tmp/smoke-response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "Smoke test failed — Lambda returned status $RESPONSE"
            exit 1
          fi
